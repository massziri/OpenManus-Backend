# Render Blueprint for OpenManus API backend — FREE-TIER OPTIMIZED
# =================================================================
# This blueprint deploys a slim backend (~250 MB image) that stays under
# Render's 512 MB free-tier RAM ceiling by connecting to a REMOTE Chromium
# hosted on browserless.io (also free).
#
# One-click deploy: from your GitHub repo on Render, click "New Blueprint"
# and select this repo. Render will read this file and provision the service.

services:
  - type: web
    name: openmanus-api
    env: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile.render
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: USER_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: BROWSERLESS_TOKEN
        sync: false
      - key: BROWSERLESS_HOST
        value: "production-sfo.browserless.io"
      - key: OPENMANUS_BASE_URL
        value: "https://bazaarlink.ai/api/v1"
      - key: OPENMANUS_MODEL
        value: "auto:free"
      - key: VISION_BASE_URL
        value: "https://bazaarlink.ai/api/v1"
      - key: VISION_MODEL
        value: "z-ai/glm-5v-turbo"
      - key: VISION_API_KEY
        sync: false
      - key: REQUEST_TIMEOUT_S
        value: "600"
      - key: MAX_PROMPT_LEN
        value: "8000"
      - key: PYTHONUNBUFFERED
        value: "1"
